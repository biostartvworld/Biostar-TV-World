<!doctype html>
<html lang="bn">
<head>
<meta charset="utf-8">
<meta name="google-site-verification" content="mJfeKwLuQa2NVq4sCvPBuE1zIe9lCJtVBE4PwuRfZCc" />
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="https://thebengalee.com/wp-content/uploads/2025/12/Biostar_TV-removebg-preview-300x190.webp">

<title>Biostar TV World</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}
*{ box-sizing:border-box }

/* HEADER */
.header{
  position:sticky;
  top:0;
  z-index:50;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 14px;
  background:#111;
}
.brand{font-weight:700;font-size:16px;}
.iconBtn{
  background:transparent;
  border:1px solid #0aff9d;
  color:#0aff9d;
  padding:5px 10px;
  border-radius:8px;
  cursor:pointer;
}
.search{
  display:flex;
  align-items:center;
  border:1px solid #0aff9d;
  padding:4px 6px;
  border-radius:6px;
}
.search input{
  background:transparent;
  border:none;
  outline:none;
  color:#0aff9d;
}

/* CATEGORY (mobile) */
.categoryRow{
  display:flex;
  gap:6px;
  padding:6px 4px;
  overflow-x:auto;
  background:#000;
}
.cat{
  padding:6px 12px;
  border:1px solid #0aff9d;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
  color:#0aff9d;
  font-weight:600;
}

/* VIDEO SECTION */
#videoSection{
  width:100%;
  display:none; 
  flex-direction:column;
  position:sticky;
  top:60px;
  z-index:30;
}

.videoCard{
  background:#111;
  border-radius:10px;
  padding:6px;
  margin-bottom:0px;
  position:relative;
}

video#player{
  width:100%;
  height:320px;      /* MOBILE FIXED HEIGHT */
  border-radius:20px;
  object-fit:cover;
}

.watermark{
  position:absolute;
  right:65px;
  bottom:125px;
  width:58px;
  opacity:9.32;
}

.playInfo{
  display:flex;
  gap:12px;
  margin-top:8px;
  background:rgba(255,255,255,0.05);
  padding:6px;
  border-radius:8px;
}
.playInfo img{
  width:60px;
  height:60px;
  border-radius:6px;
}
.title{font-size:16px;font-weight:700}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(120px,1fr));
  gap:12px;
  padding:10px;
}
.card{
  background:#111;
  border-radius:10px;
  border:1px solid rgba(10,255,157,0.3);
  padding:10px;
  text-align:center;
  cursor:pointer;
}
.card:hover{ border-color:#0aff9d; }
.card img{
  width:80px;
  height:80px;
  object-fit:cover;
  border-radius:6px;
}
.card .name{
  margin-top:6px;
  font-size:12px;
  font-weight:700;
}

/* PREMIUM TAG */
.badge{
  background:#0aff9d;
  color:#000;
  padding:2px 6px;
  border-radius:6px;
  font-size:10px;
  display:inline-block;
  margin-top:4px;
}

/* PC MODE */
@media (min-width:768px){

  .main{
    display:flex;
    height:calc(100vh - 80px);
  }

  #videoSection{
    display:none;
    width:45%;
    top:80px;
    padding:10px;
  }

  /* PC VIDEO HEIGHT BIG */
  video#player{
    height:370px !important;
    width: 200;
  }

  #gridContainer{
    width:55%;
    height:100%;
    overflow-y:auto;
  }

  #categories{ display:none; }
  #backBtn{ display:none !important; }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div style="display:flex;align-items:center;gap:10px;">
    <button id="backBtn" class="iconBtn" style="display:none" onclick="onBack()">←</button>
    <div class="brand">Biostar TV World</div>
  </div>
  <div class="search"><input id="search" placeholder="Search..." oninput="onSearch()"></div>
</div>

<!-- CATEGORY (mobile only) -->
<div id="categories" class="categoryRow">
  <div class="cat" onclick="filter('all')">All</div>
  <div class="cat" onclick="filter('sports')">Sports</div>
  <div class="cat" onclick="filter('movies')">Movies</div>
  <div class="cat" onclick="filter('bangla')">Bangla</div>
  <div class="cat" onclick="filter('kids')">Kids</div>
</div>

<div class="main">

  <!-- VIDEO -->
  <div id="videoSection">
    <div class="videoCard">
      <video id="player" controls playsinline></video>
      <img class="watermark" src="https://thebengalee.com/wp-content/uploads/2025/12/Biostar_TV-removebg-preview-300x190.webp">

      <div class="playInfo">
        <img id="playLogo">
        <div id="playTitle" class="title">Channel Name</div>
      </div>
    </div>
  </div>

  <!-- CHANNEL LIST -->
  <div id="gridContainer">
    <div id="grid" class="grid">Loading…</div>
  </div>

</div>

<script>
let channels=[],filtered=[],hls=null;
const playlistURL="https://raw.githack.com/abusaeeidx/Mrgify-BDIX-IPTV/main/playlist.m3u";

const grid=document.getElementById('grid');
const videoSection=document.getElementById('videoSection');
const player=document.getElementById('player');
const playLogo=document.getElementById('playLogo');
const playTitle=document.getElementById('playTitle');
const backBtn=document.getElementById('backBtn');

/* LOAD PLAYLIST */
async function loadPlaylist(){
  const res=await fetch(playlistURL);
  const text=await res.text();
  const lines=text.split(/\r?\n/);

  channels=[];

  for(let i=0;i<lines.length;i++){
    if(lines[i].startsWith("#EXTINF")){
      
      const name=(lines[i].split(",")[1]||"Channel").trim();
      const logoMatch=lines[i].match(/tvg-logo="([^"]+)"/);
      const logo=logoMatch?logoMatch[1]:"https://via.placeholder.com/120";
      let url=lines[i+1]||"";

      if(!url.startsWith("http")) continue;

      /* CHECK PREMIUM */
      let premium=false;
      if(/premium|vip|hd|paid/i.test(lines[i])) premium=true;

      channels.push({name,logo,url,premium});
    }
  }

  filtered=channels.slice();
  renderGrid();
}

function renderGrid(){
  grid.innerHTML="";

  filtered.forEach((ch,i)=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <img src="${ch.logo}">
      <div class="name">${ch.name}</div>
      ${ch.premium ? '<div class="badge">PREMIUM</div>' : ''}
    `;

    div.onclick=()=>onPlay(i);
    grid.appendChild(div);
  });
}

/* SEARCH */
function onSearch(){
  const q=document.getElementById("search").value.toLowerCase();
  filtered=channels.filter(c=>c.name.toLowerCase().includes(q));
  renderGrid();
}

/* CATEGORY FILTER */
function filter(cat){
  if(cat==="all") filtered=channels.slice();
  else filtered=channels.filter(c=>c.name.toLowerCase().includes(cat));
  renderGrid();
}

/* PLAY */
function onPlay(i){
  const ch=filtered[i];

  if(window.innerWidth < 768){
    videoSection.style.display="flex";
    document.getElementById("categories").style.display="none";
    backBtn.style.display="inline-block";
  } else {
    videoSection.style.display="flex";
  }

  playLogo.src=ch.logo;
  playTitle.textContent=ch.name;

  if(hls){hls.destroy();hls=null;}

  if(Hls.isSupported()){
    hls=new Hls();
    hls.loadSource(ch.url);
    hls.attachMedia(player);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>player.play());
  }else{
    player.src=ch.url;
    player.play();
  }
}

/* BACK FOR MOBILE */
function onBack(){
  player.pause();
  player.src="";
  videoSection.style.display="none";
  document.getElementById("categories").style.display="flex";
  backBtn.style.display="none";
}

loadPlaylist();
</script>

</body>
</html>
